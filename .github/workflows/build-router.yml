# Builds the tenant-alert-router image and pushes it to GitHub Container Registry.
#
# Tags pushed on every push to main:
#   ghcr.io/madawotee/tenant-alert-router:main
#   ghcr.io/madawotee/tenant-alert-router:<7-char-sha>
#
# Tags pushed on git tag v*.*.*:
#   ghcr.io/madawotee/tenant-alert-router:0.1.0
#   ghcr.io/madawotee/tenant-alert-router:0.1
#   ghcr.io/madawotee/tenant-alert-router:latest
#
# After a push to main, manually bump `router.image.tag` in chart/values.yaml
# to the new sha. Argo CD detects the change on the next refresh and rolls out.
#
# No extra secrets needed — uses the workflow's GITHUB_TOKEN automatically.
 
name: build-router
 
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "tenant-alert-router/**"
      - ".github/workflows/build-router.yml"
  release:
    types: [published]
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tenant-alert-router
 
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR
    timeout-minutes: 15
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercase the owner — GHCR namespaces must be lowercase
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
 
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./tenant-alert-router
          file: ./tenant-alert-router/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
 
      - name: Print pushed tags
        run: |
          echo "::notice::Pushed image tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Update chart/values.yaml router.image.tag to one of the above,"
          echo "commit + push, and Argo CD will roll out the new version."